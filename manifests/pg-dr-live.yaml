apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: pg-dr
  namespace: pg-dr
spec:
  postgresVersion: 16

  standby:
    enabled: true
    repoName: repo1

  instances:
    - name: instance1
      replicas: 2
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

  backups:
    pgbackrest:
      repos:
        - name: repo1
          s3:
            bucket: keen-pgbackrest-dr-2026
            endpoint: s3.us-west-2.amazonaws.com
            region: us-west-2
      global:
        repo1-path: /dc/pg-dc
        repo1-s3-key: <YOUR_S3_ACCESS_KEY>
        repo1-s3-key-secret: "<YOUR_S3_SECRET_KEY>"
        repo1-s3-region: us-west-2
